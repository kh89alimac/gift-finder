[alembic]
# Path to migration scripts (relative to this file)
script_location = app/migrations

# Template used to generate migration file names; %%(rev)s gets replaced with
# the new revision id, %%(slug)s with the slugified description.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Sys.path additions, separated by os.pathsep.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 60

# Set to 'true' to run the environment during the 'revision' command, regardless
# of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file.
sourceless = false

# Version path separator (os = system path separator)
version_path_separator = os

# Output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# The actual DB URL is loaded from app.core.config.settings.DATABASE_URL inside env.py.
# This entry is required by alembic but intentionally left blank.
sqlalchemy.url =


[post_write_hooks]
# Format/lint generated migration files using ruff.
hooks = ruff_format, ruff_lint
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

ruff_lint.type = console_scripts
ruff_lint.entrypoint = ruff
ruff_lint.options = check --fix --exit-zero REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
